version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wakaman-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wakaman
      POSTGRES_USER: wakaman
      POSTGRES_PASSWORD: wakaman_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakaman"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wakaman-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wakaman-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: wakaman
      RABBITMQ_DEFAULT_PASS: wakaman_dev
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: wakaman-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wakaman_dev_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  mailhog:
    image: mailhog/mailhog
    container_name: wakaman-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  meilisearch_data:
